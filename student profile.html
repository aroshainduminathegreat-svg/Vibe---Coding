<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Student Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            /* Gradient Background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            width: 420px;
            /* High Rounded Corners */
            border-radius: 24px;
            /* Sophisticated Shadow */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* Subtle hover effect */
        .profile-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            width: 110px;
            height: 110px;
            background: #f0f2f5;
            /* Rounded Corners for the Placeholder */
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 3px solid #764ba2;
            overflow: hidden;
        }

        .image-container img {
            width: 60%;
            filter: grayscale(1);
            opacity: 0.4;
        }

        .stream-badge {
            background: #764ba215;
            color: #764ba2;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 15px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a1a1a;
            margin: 0 0 10px 0;
        }

        .bio {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            margin: 0;
            font-weight: 400;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Profile icon">
        </div>

        <div class="stream-badge">Quantum Physics</div>

        <h2 class="name">Jordan Sterling</h2>
        
        <p class="bio">
            Exploring the intersection of particle mechanics and high-speed computing. Amateur astronomer and coffee enthusiast.
        </p>
    </div>

</body>
</html>
